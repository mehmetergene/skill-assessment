<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CX Designer Skill Matrix</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #f8fafc, #e2e8f0); }
    .container { display: flex; flex-direction: column; height: 100vh; background: linear-gradient(135deg, #f8fafc, #e2e8f0); }
    .container:fullscreen { background: linear-gradient(135deg, #f8fafc, #e2e8f0) !important; }
    ::backdrop { background: linear-gradient(135deg, #f8fafc, #e2e8f0) !important; }
    .header { display: flex; align-items: center; justify-content: center; padding: 12px 20px; position: relative; }
    .header-left { position: absolute; left: 20px; display: flex; gap: 8px; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1f2937; cursor: pointer; }
    .header p { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .header-right { position: absolute; right: 20px; display: flex; gap: 10px; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #d1d5db; background: #fff; color: #555; transition: all 0.15s; }
    .btn:hover { background: #f3f4f6; }
    .btn-icon { padding: 8px 12px; display: flex; align-items: center; gap: 6px; }
    .btn-icon svg { width: 16px; height: 16px; }
    .main { flex: 1; display: flex; position: relative; overflow: hidden; }
    .chart-wrap { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; }
    .panel { position: absolute; right: 16px; top: 16px; width: 280px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; z-index: 10; max-height: calc(100% - 32px); overflow-y: auto; }
    .panel h2 { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    .panel .tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
    .panel .tag.core { background: #7CB9A0; color: #fff; }
    .panel .tag.supporting { background: #A8C8E8; color: #1f2937; }
    .panel .desc { color: #4b5563; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .panel .status { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
    .panel .status.marked { background: #ecfdf5; color: #047857; }
    .panel .status.unmarked { background: #f3f4f6; color: #6b7280; }
    .footer { background: rgba(255,255,255,0.95); border-top: 1px solid #e5e7eb; padding: 12px 16px; }
    .footer-inner { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; }
    .legend-item .dot { width: 16px; height: 16px; border-radius: 4px; }
    .counter { font-size: 14px; color: #6b7280; padding: 8px 16px; background: #f9fafb; border-radius: 8px; }
    .counter strong { color: #1f2937; }
    .copyright { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 8px; }
    .error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 40px; text-align: center; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 32px; max-width: 500px; }
    .error-box h2 { color: #dc2626; margin-bottom: 16px; font-size: 18px; }
    .error-box p { color: #7f1d1d; margin-bottom: 16px; font-size: 14px; line-height: 1.6; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:#6b7280">Loading skills data...</p>
    </div>
  </div>

  <script>
    var DATA = null;
    var COLORS = {
      coreMarked: "#7CB9A0",
      coreUnmarked: "#d1e7dd",
      supportMarked: "#A8C8E8",
      supportUnmarked: "#dbeafe"
    };
    
    var state = {
      selected: null,
      marked: {}
    };

    var allSkills = [];
    var coreCount = 0;

    function init() {
      fetch("cx-designer-skills.json")
        .then(function(response) { 
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response.json(); 
        })
        .then(function(json) { 
          DATA = json;
          loadMarkedState();
          buildApp();
        })
        .catch(function(error) { 
          showError(error.message);
        });
    }

    function showError(msg) {
      document.getElementById("root").innerHTML = 
        '<div class="error-screen">' +
          '<div class="error-box">' +
            '<h2>Could not load skills data</h2>' +
            '<p>Please make sure <strong>cx-designer-skills.json</strong> is in the same folder as this HTML file.</p>' +
            '<p style="font-size:12px;color:#991b1b">Error: ' + msg + '</p>' +
          '</div>' +
        '</div>';
    }

    function loadMarkedState() {
      try {
        var saved = localStorage.getItem("cxDesignerMarked");
        if (saved) state.marked = JSON.parse(saved);
      } catch(e) {}
    }

    function saveMarkedState() {
      try {
        localStorage.setItem("cxDesignerMarked", JSON.stringify(state.marked));
      } catch(e) {}
    }

    function buildApp() {
      var html = '<div class="container">' +
        '<div class="header">' +
          '<div class="header-left">' +
            '<button class="btn btn-icon" onclick="exportCSV()" title="Export as CSV">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' +
              'CSV' +
            '</button>' +
            '<button class="btn btn-icon" onclick="exportImage()" title="Save as Image">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
              'Image' +
            '</button>' +
            '<button class="btn btn-icon" onclick="saveData()" title="Save Progress">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>' +
              'Save' +
            '</button>' +
          '</div>' +
          '<div style="text-align:center">' +
            '<h1 onclick="resetSelection()">' + (DATA.settings.title || "Skill Matrix") + '</h1>' +
            '<p>' + (DATA.settings.subtitle || "") + '</p>' +
          '</div>' +
          '<div class="header-right">' +
            '<button class="btn" onclick="clearAll()">Clear All</button>' +
            '<button class="btn" onclick="toggleFullscreen()">⛶</button>' +
          '</div>' +
        '</div>' +
        '<div class="main">' +
          '<div class="chart-wrap"><svg id="chart"></svg></div>' +
          '<div class="panel" id="panel">' +
            '<h2 id="panelTitle">Select a skill</h2>' +
            '<div id="panelContent"><p style="color:#9ca3af;font-size:14px">Click any skill to see details, then click a ring (1-8) to set your proficiency level.</p></div>' +
          '</div>' +
        '</div>' +
        '<div class="footer">' +
          '<div class="footer-inner">' +
            '<div class="legend-item"><div class="dot" style="background:#7CB9A0"></div><span>Hard Skills (Core)</span></div>' +
            '<div class="legend-item"><div class="dot" style="background:#A8C8E8"></div><span>Soft Skills (Supporting)</span></div>' +
            '<div class="legend-item"><div class="dot" style="background:#e5e7eb"></div><span>Not assessed</span></div>' +
            '<div class="counter" id="counter">Assessed: <strong>0</strong> / <span>0</span></div>' +
          '</div>' +
          '<p class="copyright">CX Designer Skill Matrix • Career Coaching Tool</p>' +
        '</div>' +
      '</div>';
      
      document.getElementById("root").innerHTML = html;
      
      processData();
      renderChart();
      updateCounter();
    }

    function processData() {
      allSkills = [];
      var core = DATA.skills.core || [];
      var support = DATA.skills.supporting || [];
      coreCount = core.length;
      
      for (var i = 0; i < core.length; i++) {
        var s = core[i];
        allSkills.push({ 
          name: s.name, 
          explanation: s.explanation, 
          group: "core", 
          idx: i 
        });
      }
      for (var j = 0; j < support.length; j++) {
        var t = support[j];
        allSkills.push({ 
          name: t.name, 
          explanation: t.explanation, 
          group: "supporting", 
          idx: coreCount + j 
        });
      }
    }

    function renderChart() {
      var wrap = document.querySelector(".chart-wrap");
      if (!wrap) return;
      
      var wrapH = wrap.clientHeight;
      var wrapW = wrap.clientWidth;
      var maxSize = Math.min(wrapH - 60, wrapW - 320);
      var size = Math.min(maxSize, 900);

      var svg = document.getElementById("chart");
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("viewBox", "0 0 1000 1000");
      svg.style.overflow = "visible";
      svg.innerHTML = "";

      var cx = 500, cy = 500;
      var innerR = 120, outerR = 380;
      var gap = 0.025, secGap = 0.14;
      var total = allSkills.length;
      
      if (total === 0) return;

      var totalAng = 2 * Math.PI - 2 * secGap;
      var coreAng = (coreCount / total) * totalAng;
      var supAng = ((total - coreCount) / total) * totalAng;
      var startAng = -Math.PI;

      var angles = [];
      for (var i = 0; i < coreCount; i++) {
        var a = coreAng / coreCount;
        angles.push({ start: startAng + i * a + gap/2, end: startAng + (i+1) * a - gap/2 });
      }
      var supStart = startAng + coreAng + secGap;
      var supCount = total - coreCount;
      for (var j = 0; j < supCount; j++) {
        var b = supAng / supCount;
        angles.push({ start: supStart + j * b + gap/2, end: supStart + (j+1) * b - gap/2 });
      }

      function arc(s, e, ri, ro) {
        var lg = e - s > Math.PI ? 1 : 0;
        return "M" + (cx + ri * Math.cos(s)) + " " + (cy + ri * Math.sin(s)) +
               " A" + ri + " " + ri + " 0 " + lg + " 1 " + (cx + ri * Math.cos(e)) + " " + (cy + ri * Math.sin(e)) +
               " L" + (cx + ro * Math.cos(e)) + " " + (cy + ro * Math.sin(e)) +
               " A" + ro + " " + ro + " 0 " + lg + " 0 " + (cx + ro * Math.cos(s)) + " " + (cy + ro * Math.sin(s)) + " Z";
      }

      // Section backgrounds
      if (coreCount > 0) {
        var coreBg = document.createElementNS("http://www.w3.org/2000/svg", "path");
        coreBg.setAttribute("d", arc(angles[0].start - 0.03, angles[coreCount - 1].end + 0.03, innerR - 8, outerR + 8));
        coreBg.setAttribute("fill", "rgba(124,185,160,0.08)");
        coreBg.setAttribute("stroke", "rgba(124,185,160,0.2)");
        coreBg.setAttribute("stroke-width", "1");
        svg.appendChild(coreBg);
      }
      if (supCount > 0) {
        var supBg = document.createElementNS("http://www.w3.org/2000/svg", "path");
        supBg.setAttribute("d", arc(angles[coreCount].start - 0.03, angles[total - 1].end + 0.03, innerR - 8, outerR + 8));
        supBg.setAttribute("fill", "rgba(168,200,232,0.08)");
        supBg.setAttribute("stroke", "rgba(168,200,232,0.2)");
        supBg.setAttribute("stroke-width", "1");
        supBg.setAttribute("stroke-dasharray", "6 4");
        svg.appendChild(supBg);
      }

      var ringCount = 8;
      var ringW = (outerR - innerR) / ringCount;

      // Skills
      for (var idx = 0; idx < allSkills.length; idx++) {
        var sk = allSkills[idx];
        var ang = angles[idx];
        if (!ang) continue;
        
        var mid = (ang.start + ang.end) / 2;
        var isActive = state.selected === idx;
        var markedLevel = state.marked[sk.name] || 0; // 0 = not marked, 1-8 = level
        
        var baseColor, markedColor;
        if (sk.group === "core") {
          baseColor = COLORS.coreUnmarked;
          markedColor = COLORS.coreMarked;
        } else {
          baseColor = COLORS.supportUnmarked;
          markedColor = COLORS.supportMarked;
        }

        // 8 ring segments per skill
        for (var ri = 0; ri < ringCount; ri++) {
          var rInner = innerR + ri * ringW;
          var rOuter = innerR + (ri + 1) * ringW;
          var ringLevel = ri + 1;
          var isRingMarked = markedLevel >= ringLevel;
          
          var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.style.cursor = "pointer";
          
          (function(capturedIdx, capturedLevel) {
            g.onclick = function(e) { 
              e.stopPropagation();
              state.selected = capturedIdx;
              // Toggle: if clicking same level, clear it; otherwise set to this level
              var currentLevel = state.marked[allSkills[capturedIdx].name] || 0;
              if (currentLevel === capturedLevel) {
                delete state.marked[allSkills[capturedIdx].name];
              } else {
                state.marked[allSkills[capturedIdx].name] = capturedLevel;
              }
              saveMarkedState();
              renderChart();
              updatePanel();
              updateCounter();
            };
          })(idx, ringLevel);

          var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", arc(ang.start, ang.end, rInner, rOuter));
          path.setAttribute("fill", isRingMarked ? markedColor : baseColor);
          path.setAttribute("stroke", isActive ? "rgba(55,65,81,0.5)" : "#fff");
          path.setAttribute("stroke-width", isActive ? 1.2 : 0.5);
          path.setAttribute("opacity", isRingMarked ? (0.6 + (ri / ringCount) * 0.4) : 0.35);
          path.style.transition = "all 0.15s";
          g.appendChild(path);
          
          // Show level number when selected
          if (isActive) {
            var numR = rInner + ringW / 2;
            var numX = cx + numR * Math.cos(mid);
            var numY = cy + numR * Math.sin(mid);
            var num = document.createElementNS("http://www.w3.org/2000/svg", "text");
            num.setAttribute("x", numX);
            num.setAttribute("y", numY);
            num.setAttribute("text-anchor", "middle");
            num.setAttribute("dominant-baseline", "middle");
            num.setAttribute("font-size", "10");
            num.setAttribute("font-weight", "600");
            num.setAttribute("fill", isRingMarked ? "#1f2937" : "#6b7280");
            num.setAttribute("pointer-events", "none");
            num.textContent = ringLevel;
            g.appendChild(num);
          }
          
          svg.appendChild(g);
        }

        // Label (clicking label selects skill but doesn't change level)
        var labelR = outerR + 20;
        var lx = cx + labelR * Math.cos(mid);
        var ly = cy + labelR * Math.sin(mid);
        var deg = mid * 180 / Math.PI;
        var isRight = deg > -90 && deg < 90;
        var rot = isRight ? deg : deg + 180;
        var anchor = isRight ? "start" : "end";

        var words = sk.name.split(" ");
        var lines = words.length <= 2 ? [sk.name] : [words.slice(0, Math.ceil(words.length/2)).join(" "), words.slice(Math.ceil(words.length/2)).join(" ")];

        var labelG = document.createElementNS("http://www.w3.org/2000/svg", "g");
        labelG.setAttribute("transform", "translate(" + lx + "," + ly + ") rotate(" + rot + ")");
        labelG.style.cursor = "pointer";
        labelG.style.transition = "opacity 0.2s";
        
        (function(capturedIdx) {
          labelG.onclick = function(e) { 
            e.stopPropagation();
            state.selected = capturedIdx;
            renderChart();
            updatePanel();
          };
        })(idx);

        for (var lineIdx = 0; lineIdx < lines.length; lineIdx++) {
          var lt = document.createElementNS("http://www.w3.org/2000/svg", "text");
          lt.setAttribute("x", 0);
          lt.setAttribute("y", lineIdx * 16 - (lines.length - 1) * 8);
          lt.setAttribute("text-anchor", anchor);
          lt.setAttribute("dominant-baseline", "middle");
          lt.setAttribute("font-size", "13");
          lt.setAttribute("font-weight", isActive || markedLevel > 0 ? "600" : "500");
          lt.setAttribute("fill", isActive ? "#1f2937" : (markedLevel > 0 ? "#374151" : "#6b7280"));
          if (sk.group === "supporting") lt.setAttribute("font-style", "italic");
          lt.textContent = lines[lineIdx];
          labelG.appendChild(lt);
        }
        svg.appendChild(labelG);
      }

      // Center hub
      var center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      center.setAttribute("cx", cx);
      center.setAttribute("cy", cy);
      center.setAttribute("r", innerR - 10);
      center.setAttribute("fill", "#2d4a5e");
      center.setAttribute("stroke", "#1f3544");
      center.setAttribute("stroke-width", "3");
      svg.appendChild(center);

      var centerLines = ["CX", "DESIGNER"];
      for (var ci = 0; ci < centerLines.length; ci++) {
        var cTxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        cTxt.setAttribute("x", cx);
        cTxt.setAttribute("y", cy - 10 + ci * 24);
        cTxt.setAttribute("text-anchor", "middle");
        cTxt.setAttribute("fill", "#fff");
        cTxt.setAttribute("font-size", "16");
        cTxt.setAttribute("font-weight", "700");
        cTxt.setAttribute("letter-spacing", "2");
        cTxt.textContent = centerLines[ci];
        svg.appendChild(cTxt);
      }

      // Section labels - positioned well outside the chart
      var coreLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      coreLabel.setAttribute("x", 15);
      coreLabel.setAttribute("y", 20);
      coreLabel.setAttribute("text-anchor", "start");
      coreLabel.setAttribute("fill", "#047857");
      coreLabel.setAttribute("font-size", "13");
      coreLabel.setAttribute("font-weight", "700");
      coreLabel.setAttribute("letter-spacing", "2");
      coreLabel.textContent = "HARD SKILLS";
      svg.appendChild(coreLabel);

      var supLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      supLabel.setAttribute("x", 985);
      supLabel.setAttribute("y", 985);
      supLabel.setAttribute("text-anchor", "end");
      supLabel.setAttribute("fill", "#1d4ed8");
      supLabel.setAttribute("font-size", "13");
      supLabel.setAttribute("font-weight", "600");
      supLabel.setAttribute("font-style", "italic");
      supLabel.setAttribute("letter-spacing", "2");
      supLabel.textContent = "SOFT SKILLS";
      svg.appendChild(supLabel);
    }

    function updatePanel() {
      var titleEl = document.getElementById("panelTitle");
      var contentEl = document.getElementById("panelContent");
      if (!titleEl || !contentEl) return;

      if (state.selected === null) {
        titleEl.textContent = "Select a skill";
        contentEl.innerHTML = '<p style="color:#9ca3af;font-size:14px">Click any skill to see details, then click a ring (1-8) to set your proficiency level.</p>';
        return;
      }

      var sk = allSkills[state.selected];
      var markedLevel = state.marked[sk.name] || 0;
      
      titleEl.textContent = sk.name;

      var tagClass = sk.group === "core" ? "core" : "supporting";
      var tagText = sk.group === "core" ? "Hard Skill" : "Soft Skill";
      
      var html = '<span class="tag ' + tagClass + '">' + tagText + '</span>';
      html += '<p class="desc">' + sk.explanation + '</p>';
      
      if (markedLevel > 0) {
        html += '<div class="status marked" style="display:flex;align-items:center;gap:10px">';
        html += '<div style="display:flex;gap:2px">';
        for (var li = 1; li <= 8; li++) {
          var bgColor = li <= markedLevel ? (sk.group === "core" ? "#7CB9A0" : "#A8C8E8") : "#e5e7eb";
          html += '<div style="width:16px;height:16px;border-radius:3px;background:' + bgColor + '"></div>';
        }
        html += '</div>';
        html += '<span>Level ' + markedLevel + '</span>';
        html += '</div>';
        html += '<p style="font-size:12px;color:#6b7280;margin-top:8px">Click a different ring to change level, or click ring ' + markedLevel + ' again to clear.</p>';
      } else {
        html += '<div class="status unmarked">Not yet assessed</div>';
        html += '<p style="font-size:12px;color:#6b7280;margin-top:8px">Click any ring (1-8) to set your proficiency level for this skill.</p>';
      }

      contentEl.innerHTML = html;
    }

    function updateCounter() {
      var counter = document.getElementById("counter");
      if (!counter) return;
      var assessedCount = Object.keys(state.marked).length;
      counter.innerHTML = "Assessed: <strong>" + assessedCount + "</strong> / " + allSkills.length;
    }

    function resetSelection() {
      state.selected = null;
      renderChart();
      updatePanel();
    }

    function clearAll() {
      if (confirm("Clear all assessed levels?")) {
        state.marked = {};
        state.selected = null;
        saveMarkedState();
        renderChart();
        updatePanel();
        updateCounter();
      }
    }

    function toggleFullscreen() {
      var container = document.querySelector(".container");
      if (!document.fullscreenElement && container) {
        container.requestFullscreen();
      } else if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    }

    function exportCSV() {
      var csv = "Skill Name,Type,Level,Description\n";
      for (var i = 0; i < allSkills.length; i++) {
        var sk = allSkills[i];
        var level = state.marked[sk.name] || 0;
        var type = sk.group === "core" ? "Hard Skill" : "Soft Skill";
        var desc = sk.explanation.replace(/"/g, '""'); // Escape quotes
        csv += '"' + sk.name + '",' + type + ',' + level + ',"' + desc + '"\n';
      }
      
      var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      var link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "cx-designer-skills.csv";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function exportImage() {
      var svg = document.getElementById("chart");
      
      // Clone SVG and add necessary attributes for standalone rendering
      var clone = svg.cloneNode(true);
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      
      // Add background rect
      var bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      bg.setAttribute("width", "100%");
      bg.setAttribute("height", "100%");
      bg.setAttribute("fill", "#f1f5f9");
      clone.insertBefore(bg, clone.firstChild);
      
      // Add title text
      var title = document.createElementNS("http://www.w3.org/2000/svg", "text");
      title.setAttribute("x", "500");
      title.setAttribute("y", "980");
      title.setAttribute("text-anchor", "middle");
      title.setAttribute("font-family", "system-ui, sans-serif");
      title.setAttribute("font-size", "12");
      title.setAttribute("fill", "#9ca3af");
      title.textContent = (DATA.settings.title || "Skill Matrix") + " • " + new Date().toLocaleDateString();
      clone.appendChild(title);
      
      var svgData = new XMLSerializer().serializeToString(clone);
      var svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      var url = URL.createObjectURL(svgBlob);
      
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var scale = 2;
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        var ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0);
        
        var pngUrl = canvas.toDataURL("image/png");
        var link = document.createElement("a");
        link.href = pngUrl;
        link.download = "cx-designer-skills.png";
        link.click();
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function saveData() {
      saveMarkedState();
      var count = Object.keys(state.marked).length;
      alert("Progress saved! " + count + " skills assessed.\n\nYour data is stored in your browser and will be available next time you open this page.");
    }

    window.onresize = function() { if (DATA) renderChart(); };
    window.onload = init;
  </script>
</body>
</html>
